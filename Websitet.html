<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!-- CRITICAL for iOS -->
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>GlowVera Beauty</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
html, body {
  margin: 0;
  padding: 0;
  -webkit-font-smoothing: antialiased;
}

/* SAFARI FIX */
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Poppins', sans-serif;
  background: url('https://images.unsplash.com/photo-1556228578-0d85b1a4d571?auto=format&fit=crop&w=1600&q=80') no-repeat center;
  background-size: cover;
}

/* OVERLAY */
.overlay {
  background: rgba(255,255,255,0.94);
  min-height: 100vh;
  padding-bottom: env(safe-area-inset-bottom);
}

/* NAV */
nav {
  display: flex;
  justify-content: space-between;
  padding: 15px 20px;
  position: sticky;
  top: 0;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(8px);
  z-index: 1000;
}

.cart-btn {
  background: #ff3e7f;
  color: white;
  padding: 8px 14px;
  border-radius: 20px;
  font-size: 14px;
}

/* HERO */
.hero {
  text-align: center;
  padding: 30px 15px;
}

.hero h1 {
  font-size: 1.8rem;
}

/* CATEGORIES */
.categories {
  display: flex;
  overflow-x: auto;
  gap: 10px;
  padding: 10px;
  -webkit-overflow-scrolling: touch;
}

.cat-btn {
  flex: 0 0 auto;
  padding: 8px 14px;
  border-radius: 20px;
  background: #eee;
  font-size: 14px;
}

/* PRODUCTS GRID (MOBILE FIRST) */
.products {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  padding: 15px;
}

/* DESKTOP */
@media(min-width:768px){
  .products {
    grid-template-columns: repeat(4, 1fr);
  }
}

/* CARD */
.card {
  background: white;
  border-radius: 12px;
  padding: 10px;
  text-align: center;
}

.card img {
  width: 100%;
  height: 140px;
  object-fit: cover;
  border-radius: 8px;
}

/* BUTTON */
.btn {
  margin-top: 8px;
  padding: 8px;
  background: #ff3e7f;
  color: white;
  border-radius: 20px;
  font-size: 14px;
}

/* CART */
.cart {
  position: fixed;
  right: -100%;
  top: 0;
  width: 85%;
  max-width: 320px;
  height: 100%;
  background: white;
  padding: 20px;
  transition: 0.3s;
  z-index: 2000;
}

.cart.active {
  right: 0;
}

.checkout {
  margin-top: 20px;
  padding: 12px;
  background: black;
  color: white;
  text-align: center;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="overlay">

<nav>
  <strong>GlowVera</strong>
  <div class="cart-btn" onclick="toggleCart()">Cart (<span id="count">0</span>)</div>
</nav>

<section class="hero">
  <h1>Glow Anywhere ✨</h1>
</section>

<div class="categories">
  <div class="cat-btn" onclick="filterProducts('all')">All</div>
  <div class="cat-btn" onclick="filterProducts('face')">Face</div>
  <div class="cat-btn" onclick="filterProducts('body')">Body</div>
  <div class="cat-btn" onclick="filterProducts('serum')">Serum</div>
</div>

<section class="products">

<div class="card" data-cat="face">
<img src="https://images.unsplash.com/photo-1596462502278-27bfdc403348?auto=format&fit=crop&w=400&q=80">
<p>Cleanser</p>
<div class="btn" onclick="addToCart('Cleanser',14.99)">Add</div>
</div>

<div class="card" data-cat="face">
<img src="https://images.unsplash.com/photo-1611080626919-7cf5a9dbab5b?auto=format&fit=crop&w=400&q=80">
<p>Moisturizer</p>
<div class="btn" onclick="addToCart('Moisturizer',22.99)">Add</div>
</div>

<div class="card" data-cat="body">
<img src="https://images.unsplash.com/photo-1601049676869-702ea24cfd58?auto=format&fit=crop&w=400&q=80">
<p>Body Lotion</p>
<div class="btn" onclick="addToCart('Body Lotion',18.99)">Add</div>
</div>

<div class="card" data-cat="serum">
<img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?auto=format&fit=crop&w=400&q=80">
<p>Vitamin C Serum</p>
<div class="btn" onclick="addToCart('Vitamin C Serum',19.99)">Add</div>
</div>

</section>

<div class="cart" id="cart">
<h2>Your Cart</h2>
<div id="cartItems"></div>
<div class="checkout" onclick="checkout()">Find Best Deals →</div>
</div>

</div>

<script>
let cart=[];

function toggleCart(){
 document.getElementById('cart').classList.toggle('active');
}

function addToCart(name,price){
 cart.push({name,price});
 document.getElementById('count').innerText=cart.length;
 renderCart();
}

function renderCart(){
 let html="";
 cart.forEach(i=>{
  html+=`<div>${i.name} - $${i.price}</div>`;
 });
 document.getElementById('cartItems').innerHTML=html;
}

function checkout(){
 let query=cart.map(i=>i.name).join("+");
 window.location.href="https://www.amazon.com/s?k="+query;
}

function filterProducts(cat){
 document.querySelectorAll('.card').forEach(c=>{
  c.style.display=(cat==='all'||c.dataset.cat===cat)?"block":"none";
 });
}
</script>

</body>
</html>
